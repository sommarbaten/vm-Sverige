<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>VM 2026 – Schema</title>
<meta name="description" content="Fotbolls-VM 2026: alla matcher i svensk tid, kanal och grupp." />
<meta name="theme-color" content="#0A1711" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="VM 2026" />
<style>
  :root{
    --bg:#0A1711; --bg2:#0C1C14; --card:#102619; --cardHi:#15331F;
    --line:#1E3B2C; --text:#EAF3EC; --sub:#90A99B; --faint:#5E776A;
    --gold:#F4C430; --goldDim:#7A661F; --blue:#1E78C8; --green:#3FBF6F;
    --svt:#4C95FF; --tv4:#FF5A5A; --play:#FFA73D;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg); color:var(--text);
    font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
    padding-top:env(safe-area-inset-top); padding-bottom:env(safe-area-inset-bottom);
  }
  .wrap{max-width:680px;margin:0 auto;padding:0 14px 70px}
  .scroll::-webkit-scrollbar{height:0}
  .scroll{scrollbar-width:none;-webkit-overflow-scrolling:touch}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  .live-tag{animation:pulse 1.4s ease-in-out infinite}
  @media (prefers-reduced-motion:reduce){.live-tag{animation:none}}
  .chip,.tab,.row,.gcard,.toggle{transition:all .15s ease}
  .row:active{transform:translateX(2px)}
  button{font-family:inherit}
  button:focus-visible{outline:2px solid var(--gold);outline-offset:2px;border-radius:8px}

  /* header */
  header{padding:22px 0 14px}
  .eyebrow{font-size:11px;letter-spacing:.32em;color:var(--gold);font-weight:700;text-transform:uppercase}
  h1{font-size:38px;font-weight:800;letter-spacing:-.02em;line-height:1;margin:2px 0 0;display:inline-block}
  .yr-sub{color:var(--sub);font-size:13px;font-weight:500;margin-left:10px}
  .hosts{color:var(--faint);font-size:12.5px;margin-top:6px}
  .stripe{height:3px;margin-top:14px;border-radius:3px;background:linear-gradient(90deg,var(--blue) 0%,var(--blue) 40%,var(--gold) 40%,var(--gold) 100%)}

  /* tabs */
  .tabs{display:flex;gap:6px;background:var(--bg2);padding:4px;border-radius:12px;border:1px solid var(--line)}
  .tab{flex:1;padding:9px 0;border-radius:9px;border:none;cursor:pointer;font-size:14px;font-weight:700;background:transparent;color:var(--sub)}
  .tab.on{background:var(--gold);color:#1A1400}

  /* hero */
  .hero{margin-top:16px;padding:14px 16px;border-radius:16px;background:var(--cardHi);border:1px solid var(--goldDim);position:relative;overflow:hidden}
  .hero .bar{position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--gold)}
  .hero .lbl{font-size:10.5px;letter-spacing:.22em;color:var(--gold);font-weight:700;text-transform:uppercase}
  .hero .match{font-size:20px;font-weight:800;letter-spacing:-.01em;margin-top:8px}
  .hero .meta{display:flex;align-items:center;gap:12px;margin-top:8px;flex-wrap:wrap}
  .hero .when{color:var(--sub);font-size:13px}
  .hero .when b{color:var(--text)}
  .hero .cd{margin-left:auto;font-size:12px;color:var(--gold);font-weight:700}

  /* filters */
  .filters{margin-top:16px}
  .flabel{font-size:10.5px;color:var(--faint);font-weight:700;letter-spacing:.12em;margin:0 0 6px 2px;text-transform:uppercase}
  .frow{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px}
  .chip{flex-shrink:0;padding:7px 13px;border-radius:9px;cursor:pointer;font-size:13px;font-weight:700;white-space:nowrap;border:1px solid var(--line);background:var(--bg2);color:var(--sub)}
  .toggles{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
  .toggle{padding:7px 13px;border-radius:9px;cursor:pointer;font-size:13px;font-weight:700;border:1px solid var(--line);background:var(--bg2);color:var(--sub)}
  .toggle.on{border-color:var(--gold);background:rgba(244,196,48,.15);color:var(--gold)}

  /* schedule */
  .day{margin-bottom:10px}
  .dayhead{display:flex;align-items:center;gap:8px;padding:14px 2px 8px;position:sticky;top:0;background:var(--bg);z-index:5}
  .dayhead h2{font-size:13.5px;font-weight:700;letter-spacing:.02em;margin:0}
  .dayhead .rule{flex:1;height:1px;background:var(--line)}
  .dayhead .cnt{font-size:11px;color:var(--faint)}
  .today{font-size:10px;font-weight:800;letter-spacing:.1em;color:#1A1400;background:var(--gold);padding:2px 7px;border-radius:6px;text-transform:uppercase}

  .row{display:flex;align-items:stretch;gap:12px;padding:11px 13px;margin-bottom:6px;border-radius:13px;background:var(--card);border:1px solid var(--line);position:relative}
  .row.swe{background:var(--cardHi);border-color:var(--goldDim)}
  .row.played{opacity:.5}
  .row .swebar{position:absolute;left:0;top:8px;bottom:8px;width:3px;border-radius:3px;background:var(--gold)}
  .time{width:52px;flex-shrink:0;display:flex;flex-direction:column;justify-content:center}
  .time .t{font-size:17px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:-.01em}
  .time .s{font-size:9.5px;letter-spacing:.06em}
  .teams{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center;gap:3px}
  .team{display:flex;align-items:center;gap:8px;min-width:0}
  .team .fl{font-size:17px;flex-shrink:0}
  .team .nm{font-size:14.5px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .team.ko .nm{font-style:italic;color:#C9D8CD;font-weight:600}
  .team.hi .nm{color:var(--gold);font-weight:800}
  .badges{flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;justify-content:center;gap:6px}
  .chbadge{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:700;padding:3px 8px;border-radius:7px;white-space:nowrap}
  .chbadge .dot{width:6px;height:6px;border-radius:50%;display:inline-block}
  .gtag{font-size:10.5px;font-weight:600;white-space:nowrap;color:var(--faint)}
  .gtag.swe{color:var(--gold)}

  .empty{text-align:center;padding:48px 16px;color:var(--sub)}
  .empty .big{font-size:15px;font-weight:600}
  .empty button{margin-top:12px;background:var(--gold);color:#1A1400;border:none;padding:8px 16px;border-radius:8px;font-weight:700;cursor:pointer;font-size:13px}

  .note{margin-top:14px;padding:14px 16px;border-radius:14px;background:var(--bg2);border:1px dashed var(--line);color:var(--sub);font-size:12.5px;line-height:1.5}

  /* groups */
  .groups{margin-top:16px;display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .gcard{padding:12px 13px;border-radius:14px;background:var(--card);border:1px solid var(--line)}
  .gcard.swe{background:var(--cardHi);border-color:var(--goldDim)}
  .gcard .gh{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
  .gcard .gn{font-size:13px;font-weight:800;letter-spacing:.04em}
  .gcard.swe .gn{color:var(--gold)}
  .gcard .swetag{font-size:9.5px;font-weight:700;color:var(--gold);text-transform:uppercase}
  .gteam{display:flex;align-items:center;gap:7px;padding:3px 0;font-size:13.5px;font-weight:500}
  .gteam .fl{font-size:16px}
  .gteam.hi{color:var(--gold);font-weight:700}
  .gfull{grid-column:1/-1;color:var(--faint);font-size:12px;line-height:1.5;margin-top:2px}

  .sc{margin-left:auto;font-size:15px;font-weight:700;font-variant-numeric:tabular-nums;color:var(--sub);padding-left:8px;flex-shrink:0}
  .sc.win{color:var(--text)}
  .tbl{width:100%;border-collapse:collapse;font-size:12px}
  .tbl th{font-size:10px;color:var(--faint);font-weight:700;text-transform:uppercase;text-align:center;padding:4px 2px;border-bottom:1px solid var(--line)}
  .tbl th.lft,.tbl td.lft{text-align:left}
  .tbl td{padding:7px 2px;text-align:center;border-bottom:1px solid var(--line);color:var(--sub);font-variant-numeric:tabular-nums}
  .tbl td.lft{color:var(--text);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:130px}
  .tbl td.pos{color:var(--faint);width:18px}
  .tbl td.pts{color:var(--text);font-weight:800}
  .tbl tr.adv td.pos{box-shadow:inset 3px 0 0 var(--green)}
  .tbl tr.swe td{background:rgba(244,196,48,.06)}
  .row.tap{cursor:pointer}
  .row.opened{margin-bottom:0;border-bottom-left-radius:0;border-bottom-right-radius:0}
  .caret{margin-left:5px;color:var(--faint);font-size:9px}
  .evts{margin:-2px 0 7px;padding:9px 13px;border-radius:0 0 13px 13px;background:var(--bg2);border:1px solid var(--line);border-top:none}
  .evln{display:flex;align-items:center;gap:8px;padding:3px 0;font-size:12.5px}
  .evmin{width:42px;flex-shrink:0;color:var(--faint);font-variant-numeric:tabular-nums;font-weight:700}
  .evic{width:18px;flex-shrink:0;text-align:center}
  .evfl{flex-shrink:0}
  .evnm{color:var(--text)}
  .tapn{cursor:pointer;border-bottom:1px dotted var(--faint)}
  .evtag{font-size:9.5px;color:var(--faint);text-transform:uppercase;letter-spacing:.05em;border:1px solid var(--line);padding:1px 5px;border-radius:5px;margin-left:4px}
  .evsec{padding-bottom:9px;margin-bottom:9px;border-bottom:1px solid var(--line)}
  .lut{margin-top:9px}
  .lut:first-child{margin-top:0}
  .luhead{font-size:11.5px;font-weight:800;color:var(--text);letter-spacing:.02em;margin-bottom:5px}
  .luform{color:var(--faint);font-weight:600;font-size:10px;margin-left:6px;letter-spacing:.04em}
  .lumsg{font-size:12px;color:var(--faint);padding:2px 0}
  .lup{display:flex;align-items:center;gap:8px;padding:2px 0;font-size:12px}
  .lunum{width:20px;text-align:right;color:var(--faint);font-variant-numeric:tabular-nums;flex-shrink:0}
  .lupos{width:30px;color:var(--faint);font-size:9.5px;text-transform:uppercase;flex-shrink:0}
  .lupn{color:var(--text)}
  .luout{color:var(--tv4);font-size:10px;font-weight:700;margin-left:5px}
  .lusubs{margin-top:6px;font-size:11.5px;color:var(--sub);line-height:1.6}
  .lusublbl{color:var(--faint);font-weight:700;text-transform:uppercase;font-size:10px;letter-spacing:.05em}
  .luin{color:var(--green);font-weight:600}
  .luun{color:var(--faint)}
  .lup,.luin,.luun{cursor:pointer}
  .lup:active{opacity:.6}
  .row.fin{opacity:.72}
  .strow{display:flex;align-items:center;gap:8px;font-size:12px;margin-top:7px}
  .stv{width:46px;color:var(--text);font-weight:700;font-variant-numeric:tabular-nums}
  .stvr{text-align:right}
  .stl{flex:1;text-align:center;color:var(--sub);font-size:11px}
  .stbar{height:5px;margin-top:3px;border-radius:3px;background:rgba(76,149,255,.28);overflow:hidden}
  .stbar>span{display:block;height:100%;background:var(--gold);border-radius:3px}
  .pc-back{position:fixed;inset:0;background:rgba(4,10,7,.7);display:flex;align-items:center;justify-content:center;padding:24px;z-index:50}
  .pc-card{position:relative;width:100%;max-width:320px;background:var(--card);border:1px solid var(--line);border-radius:18px;padding:18px 18px 14px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
  .pc-x{position:absolute;top:12px;right:12px;background:transparent;border:none;color:var(--sub);font-size:16px;cursor:pointer;line-height:1}
  .pc-name{display:flex;align-items:center;gap:10px;font-size:17px;font-weight:800;color:var(--text);margin-bottom:12px;padding-right:20px}
  .pc-img{width:44px;height:44px;border-radius:50%;object-fit:cover;background:var(--bg2);flex-shrink:0}
  .pc-row{display:flex;justify-content:space-between;gap:12px;padding:6px 0;border-bottom:1px solid var(--line);font-size:13px}
  .pc-row:last-child{border-bottom:none}
  .pc-k{color:var(--faint)}
  .pc-v{color:var(--text);font-weight:600;text-align:right}
  .pc-msg{color:var(--sub);font-size:13px;padding:6px 0}
  footer{margin-top:26px;text-align:center;color:var(--faint);font-size:11px}
</style>
</head>

        '<button class="tab '+(state.tab==="schema"?"on":"")+'" data-act="tab" data-val="schema">Schema</button>'+
        '<button class="tab '+(state.tab==="tabeller"?"on":"")+'" data-act="tab" data-val="tabeller">Tabeller</button>'+
        '<button class="tab '+(state.tab==="skytteliga"?"on":"")+'" data-act="tab" data-val="skytteliga">Skytteliga</button></div>';

  if(state.tab==="schema"){
    html+=liveBar();
    // hero
    if(nextSwe){
      html+='<div class="hero"><div class="bar"></div>'+
            '<div class="lbl">Sveriges n\u00e4sta match</div>'+
            '<div class="match">'+T[nextSwe.home][0]+' '+nextSwe.home+' <span style="color:var(--faint);font-weight:500">\u2013</span> '+T[nextSwe.away][0]+' '+nextSwe.away+'</div>'+
            '<div class="meta"><span class="when">'+dayLabel(nextSwe.date)+' \u00b7 <b>'+nextSwe.time+'</b></span>'+
            chBadge(nextSwe.ch)+'<span class="gtag">Grupp '+nextSwe.g+'</span>'+countdown(nextSwe.dt,now)+'</div></div>';
    }
    // filters
    html+='<div class="filters">';
    html+=filterRow("Kanal",["Alla","SVT","TV4","TV4 Play"],state.ch,"ch",true);
    html+='<div style="height:8px"></div>';
    html+=filterRow("Grupp",["Alla"].concat(GROUP_LETTERS).concat(["Slutspel"]),state.grp,"grp",false);
    html+='<div class="toggles">'+
          '<button class="toggle '+(state.swe?"on":"")+'" data-act="swe">\uD83C\uDDF8\uD83C\uDDEA Bara Sverige</button>'+
          '<button class="toggle '+(state.played?"on":"")+'" data-act="played">D\u00f6lj spelade</button></div></div>';

    // schedule
    var list=MATCHES.filter(function(m){
      if(state.ch!=="Alla"&&m.ch!==state.ch)return false;
      if(state.grp!=="Alla"){if(state.grp==="Slutspel"){if(!m.ko)return false;}else if(m.g!==state.grp)return false;}
      if(state.swe&&!isSwe(m))return false;
      if(state.played&&m.dt.getTime()+7.2e6<now.getTime())return false;
      return true;
    });

    if(list.length===0){
      html+='<div class="empty"><div class="big">Inga matcher matchar filtret</div><button data-act="clear">Rensa filter</button></div>';
    }else{
      var curDay=null;
      list.forEach(function(m){
        if(m.date!==curDay){
          if(curDay!==null)html+='</div>';
          curDay=m.date;
          var dayList=list.filter(function(x){return x.date===m.date});
          var allPast=dayList.every(function(x){return x.dt.getTime()+7.2e6<now.getTime()});
          var isToday=m.date===todayStr;
          html+='<section class="day"><div class="dayhead">'+
                '<h2 style="color:'+((allPast&&!isToday)?"var(--faint)":"var(--text)")+'">'+dayLabel(m.date)+'</h2>'+
                (isToday?'<span class="today">Idag</span>':'')+
                '<div class="rule"></div><span class="cnt">'+dayList.length+(dayList.length===1?" match":" matcher")+'</span></div>';
        }
        html+=rowHTML(m,now,m.id===nextId);
      });
      if(curDay!==null)html+='</div>';
    }
    html+='<div class="note">Slutspelets tider och kanaler \u00e4r klara \u2014 vilka lag som m\u00f6ts avg\u00f6rs efter hand. Final 19 juli 21:00 (TV4), bronsmatch 18 juli 23:00 (SVT). Tider och kanaler kan \u00e4ndras med kort varsel av SVT/TV4.</div>';
  } else if(state.tab==="tabeller"){
    // tables
    html+=liveBar();
    var tables=computeTables();
    var anyPlayed=Object.keys(results).some(function(k){return results[k].state==="post"});
    if(!anyPlayed){
      html+='<div class="note" style="margin-top:12px">Tabellerna fylls p\u00e5 automatiskt n\u00e4r matcherna b\u00f6rjar avg\u00f6ras. Tryck p\u00e5 Uppdatera under en p\u00e5g\u00e5ende match f\u00f6r senaste st\u00e4llningen.</div>';
    }
    html+='<div style="margin-top:14px">';
    GROUP_LETTERS.forEach(function(g){
      var rows=tables[g];
      html+='<div style="margin-bottom:16px"><div style="font-size:12.5px;font-weight:800;letter-spacing:.04em;margin:0 0 6px 2px;color:'+(g==="F"?"var(--gold)":"var(--text)")+'">Grupp '+g+(g==="F"?' \uD83C\uDDF8\uD83C\uDDEA':'')+'</div>';
      html+='<table class="tbl"><thead><tr><th></th><th class="lft">Lag</th><th>S</th><th>V</th><th>O</th><th>F</th><th>+/-</th><th>P</th></tr></thead><tbody>';
      rows.forEach(function(r,i){
        var gd=r.gf-r.ga, gds=(gd>0?"+":"")+gd;
        var cls=(i<2?"adv":"")+(r.t==="Sverige"?" swe":"");
        html+='<tr class="'+cls+'"><td class="pos">'+(i+1)+'</td>'+
              '<td class="lft"><span style="margin-right:6px">'+T[r.t][0]+'</span>'+r.t+'</td>'+
              '<td>'+r.p+'</td><td>'+r.w+'</td><td>'+r.d+'</td><td>'+r.l+'</td><td>'+gds+'</td><td class="pts">'+r.pts+'</td></tr>';
      });
      html+='</tbody></table></div>';
    });
    html+='<div class="gfull" style="display:block">\u25b8 Gr\u00f6n kant = topp 2 (vidare till slutspel). \u00c5tta b\u00e4sta treorna g\u00e5r ocks\u00e5 vidare.</div></div>';
  } else {
    // skytteliga
    html+=liveBar();
    if(scorers.length===0){
      html+='<div class="note" style="margin-top:12px">Inga m\u00e5l \u00e4n \u2014 skyttekungen koras under turneringens g\u00e5ng. M\u00e5l dyker upp h\u00e4r automatiskt.</div>';
    }else{
      html+='<div style="margin-top:14px"><table class="tbl"><thead><tr><th></th><th class="lft">Spelare</th><th class="lft">Lag</th><th>M\u00e5l</th></tr></thead><tbody>';
      scorers.forEach(function(s,i){
        var top=i===0, swe=s.team==="Sverige";
        var fl=s.team&&T[s.team]?T[s.team][0]:"";
        var pens=s.pens>0?'<span style="color:var(--faint);font-weight:500;font-size:11px"> ('+s.pens+' str)</span>':'';
        html+='<tr class="'+(swe?"swe":"")+'"><td class="pos">'+(i+1)+'</td>'+
              '<td class="lft" style="'+(top?"color:var(--gold);font-weight:800":"")+'">'+s.name+'</td>'+
              '<td class="lft" style="color:var(--sub);font-weight:500">'+fl+' '+(s.team||"")+'</td>'+
              '<td class="pts" style="'+(top?"color:var(--gold)":"")+'">'+s.goals+pens+'</td></tr>';
      });
      html+='</tbody></table></div>';
    }
    html+='<div class="gfull" style="display:block">Sj\u00e4lvm\u00e5l r\u00e4knas inte till n\u00e5gon spelares saldo. (str) = straffm\u00e5l.</div>';
  }

  html+='<footer>S\u00e4nds av SVT &amp; TV4 i Sverige \u00b7 104 matcher \u00b7 48 lag</footer>';
  html+=playerOverlay();
  document.getElementById("app").innerHTML=html;
}

function chBadge(ch){
  var c=chColor(ch);
  return '<span class="chbadge" style="color:'+c+';background:color-mix(in srgb,'+c+' 14%, transparent)">'+
         '<span class="dot" style="background:'+c+'"></span>'+ch+'</span>';
}
function rowHTML(m,now,next){
  var swe=isSwe(m);
  var r=results[m.id];
  var hasScore=r&&r.state!=="pre"&&r.hs!=null&&r.as!=null;
  var evs=events[m.id]||[];
  var hasEv=evs.length>0;
  var open=!!state.open[m.id];
  var live,played;
  if(r){live=r.state==="in";played=r.state==="post";}
  else{var end=m.dt.getTime()+7.2e6;played=end<now.getTime();live=m.dt.getTime()<=now.getTime()&&now.getTime()<end;}
  var hf=m.ko?"":T[m.home][0], af=m.ko?"":T[m.away][0];
  var sub;
  if(live)sub='<span class="s live-tag" style="color:var(--green);font-weight:800">\u25cf '+(r&&r.detail?r.detail:"LIVE")+'</span>';
  else if(played)sub='<span class="s" style="color:var(--faint)">'+(r&&r.detail?r.detail:"Spelad")+'</span>';
  else if(next)sub='<span class="s" style="color:var(--gold);font-weight:800">N\u00c4STA</span>';
  else sub='';
  var hWin=hasScore&&r.hs>r.as, aWin=hasScore&&r.as>r.hs;
  var dim=(played&&!hasScore);
  var expandable=!!(r&&(r.state==="in"||r.state==="post"));
  var caret=expandable?'<span class="caret">'+(open?"\u25b4":"\u25be")+'</span>':'';
  var fin=(played&&hasScore);
  var out='<div class="row'+(swe?" swe":"")+(dim?" played":"")+(fin?" fin":"")+(expandable?" tap":"")+(expandable&&open?" opened":"")+'"'+(expandable?' data-act="match" data-val="'+m.id+'"':'')+'>'+
    (swe?'<div class="swebar"></div>':'')+
    '<div class="time"><span class="t" style="color:'+(live?"var(--green)":"var(--text)")+'">'+m.time+'</span>'+sub+'</div>'+
    '<div class="teams">'+
      teamHTML(hf,m.home,m.home==="Sverige",m.ko,hasScore?r.hs:null,hWin)+
      teamHTML(af,m.away,m.away==="Sverige",m.ko,hasScore?r.as:null,aWin)+
    '</div>'+
    '<div class="badges">'+chBadge(m.ch)+
    '<span class="gtag'+(m.g==="F"?" swe":"")+'">'+(m.ko?m.round:"Grupp "+m.g)+caret+'</span></div></div>';
  if(expandable&&open){
    var inner='';
    if(evs.length)inner+='<div class="evsec">'+eventsInner(evs)+'</div>';
    var s=statsHTML(m); if(s)inner+='<div class="evsec">'+s+'</div>';
    inner+=lineupHTML(m);
    if(!inner)inner='<div class="lumsg">Inga detaljer \u00e4n.</div>';
    out+='<div class="evts">'+inner+'</div>';
  }
  return out;
}
function eventsInner(evs){
  var ic={goal:"\u26bd",pen:"\u26bd",og:"\u26bd",yellow:"\uD83D\uDFE8",red:"\uD83D\uDFE5"};
  var h='';
  evs.forEach(function(e){
    var fl=e.team&&T[e.team]?T[e.team][0]:"";
    var tag=e.kind==="pen"?' <span class="evtag">str</span>':e.kind==="og"?' <span class="evtag">sj\u00e4lvm\u00e5l</span>':"";
    var nm=e.id?'<span class="evnm tapn" data-act="player" data-val="'+e.id+'">'+e.name+'</span>':'<span class="evnm">'+e.name+'</span>';
    h+='<div class="evln"><span class="evmin">'+(e.min||"")+'</span><span class="evic">'+(ic[e.kind]||"")+'</span><span class="evfl">'+fl+'</span>'+nm+tag+'</div>';
  });
  return h;
}
function teamHTML(flag,name,hi,ko,score,win){
  var sc=(score!=null)?'<span class="sc'+(win?" win":"")+'">'+score+'</span>':'';
  return '<div class="team'+(hi?" hi":ko?" ko":"")+'">'+(flag?'<span class="fl">'+flag+'</span>':'')+'<span class="nm">'+name+'</span>'+sc+'</div>';
}
function filterRow(label,opts,val,act,colorize){
  var h='<div class="flabel">'+label+'</div><div class="frow scroll">';
  opts.forEach(function(o){
    var on=val===o, accent=colorize&&o!=="Alla"?chColor(o):"var(--gold)";
    var st=on?'border-color:'+accent+';color:'+accent+';background:color-mix(in srgb,var(--bg2) 80%, '+accent+' 20%)':'';
    var lbl=(o.length===1)?"Grupp "+o:o;
    h+='<button class="chip" data-act="'+act+'" data-val="'+o+'" style="'+st+'">'+lbl+'</button>';
  });
  return h+'</div>';
}
function countdown(to,now){
  var ms=to.getTime()-now.getTime(); if(ms<=0)return"";
  var days=Math.floor(ms/864e5), hrs=Math.floor((ms%864e5)/36e5);
  var txt=days>0?("om "+days+(days===1?" dag":" dagar")):("om "+hrs+(hrs===1?" timme":" timmar"));
  return '<span class="cd">'+txt+'</span>';
}

/* ---------- Interaction (event delegation) ---------- */
document.addEventListener("click",function(e){
  var el=e.target.closest("[data-act]"); if(!el)return;
  var a=el.dataset.act, v=el.dataset.val;
  if(a==="tab")state.tab=v;
  else if(a==="ch")state.ch=v;
  else if(a==="grp")state.grp=v;
  else if(a==="swe")state.swe=!state.swe;
  else if(a==="played")state.played=!state.played;
  else if(a==="clear"){state.ch="Alla";state.grp="Alla";state.swe=false;state.played=false;}
  else if(a==="refresh"){fetchLive();return;}
  else if(a==="match"){state.open[v]=!state.open[v];if(state.open[v])fetchLineup(v);}
  else if(a==="player"){state.player=v;fetchPlayer(v);return;}
  else if(a==="closePlayer"){state.player=null;}
  else if(a==="noop"){return;}
  render();
});

/* ---------- Installable: generate icon + manifest at runtime ---------- */
function makeIcon(size){
  var c=document.createElement("canvas");c.width=c.height=size;var x=c.getContext("2d");
  x.fillStyle="#0A1711";x.fillRect(0,0,size,size);
  x.fillStyle="#F4C430";x.textAlign="center";x.textBaseline="middle";
  x.font="800 "+Math.round(size*0.34)+"px system-ui,Arial,sans-serif";
  x.fillText("VM",size/2,size*0.43);
  x.fillStyle="#EAF3EC";x.font="600 "+Math.round(size*0.135)+"px system-ui,Arial,sans-serif";
  x.fillText("2026",size/2,size*0.63);
  var sw=size*0.46, sx=(size-sw)/2, sy=size*0.76, sh=size*0.05;
  x.fillStyle="#1E78C8";x.fillRect(sx,sy,sw*0.4,sh);
  x.fillStyle="#F4C430";x.fillRect(sx+sw*0.4,sy,sw*0.6,sh);
  return c.toDataURL("image/png");
}
try{
  var i180=makeIcon(180), i192=makeIcon(192), i512=makeIcon(512);
  var ai=document.createElement("link");ai.rel="apple-touch-icon";ai.href=i180;document.head.appendChild(ai);
  var man={name:"VM 2026 \u2013 Schema",short_name:"VM 2026",start_url:".",scope:".",display:"standalone",
    background_color:"#0A1711",theme_color:"#0A1711",
    icons:[{src:i192,sizes:"192x192",type:"image/png",purpose:"any maskable"},
           {src:i512,sizes:"512x512",type:"image/png",purpose:"any maskable"}]};
  var blob=new Blob([JSON.stringify(man)],{type:"application/manifest+json"});
  var ml=document.createElement("link");ml.rel="manifest";ml.href=URL.createObjectURL(blob);document.head.appendChild(ml);
}catch(err){}

render();
fetchLive();
setInterval(function(){if(!document.hidden)fetchLive();},60000);
</script>
